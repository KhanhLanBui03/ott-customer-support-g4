name: Deploy Frontend Web to AWS S3 & CloudFront

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: 'web/package-lock.json'

    - name: Install Dependencies & Build Web
      env:
        VITE_API_BASE_URL: https://api.chatapp.yourdomain.com  # Thay thế bằng domain thực tế của bạn
        VITE_SOCKET_IO: "false"
        VITE_AGORA_APP_ID: 71fffdd590e54202bc1ea70e751324ce
      run: |
        cd web
        npm ci
        npm run build

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1  # Vùng AWS của dự án (Singapore)

    - name: Deploy to S3 Bucket
      run: |
        # Đẩy đè tất cả file tĩnh vào S3 bucket
        aws s3 sync web/dist/ s3://amzn-s3-ott-n4 --delete

    - name: Invalidate CloudFront Distribution Cache
      run: |
        # Xóa cache CloudFront để cập nhật giao diện mới ngay lập tức
        aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
