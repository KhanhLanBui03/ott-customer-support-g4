name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'whisper/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        cd backend
        mvn clean package -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and Push Backend Docker Image
      run: |
        cd backend
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-backend:latest .
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-backend:latest

    - name: Build and Push Whisper Docker Image
      run: |
        cd whisper
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-whisper:latest .
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-whisper:latest

    - name: Copy docker-compose.prod.yml to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "backend/docker-compose.prod.yml"
        target: "/home/${{ secrets.EC2_USERNAME }}/chat-app"

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull Docker image mới nhất cho cả backend và whisper
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-backend:latest
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-whisper:latest

          # Di chuyển vào thư mục chứa docker-compose của dự án trên EC2
          cd /home/${{ secrets.EC2_USERNAME }}/chat-app/backend

          # Restart container với image mới (dùng docker-compose.prod.yml đã được copy mới)
          docker compose -f docker-compose.prod.yml down
          DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" docker compose -f docker-compose.prod.yml up -d

          # Dọn dẹp các Docker image cũ không dùng đến để tránh đầy ổ đĩa
          docker image prune -f
