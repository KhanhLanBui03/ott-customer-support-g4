name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        cd backend
        mvn clean package -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        cd backend
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-backend:latest .
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-backend:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull Docker image mới nhất
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/chat-app-backend:latest
          
          # Di chuyển vào thư mục chứa docker-compose của dự án trên EC2
          cd /home/${{ secrets.EC2_USERNAME }}/chat-app/backend
          
          # Restart container với image mới
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d
          
          # Dọn dẹp các Docker image cũ không dùng đến để tránh đầy ổ đĩa
          docker image prune -f
