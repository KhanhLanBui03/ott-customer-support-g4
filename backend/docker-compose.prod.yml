version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: chat-app-redis-prod
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - chat-network
  whisper:
    image: ${DOCKER_HUB_USERNAME}/chat-app-whisper:latest
    container_name: chat-app-whisper-prod
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped
    networks:
      - chat-network
  backend:
    image: ${DOCKER_HUB_USERNAME}/chat-app-backend:latest
    container_name: chat-app-backend-prod
    ports:
      - "8080:8080"
      - "80:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - FIREBASE_CONFIG_PATH=${FIREBASE_CONFIG_PATH}
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}
      - APP_WHISPER_URL=http://whisper:8000
    depends_on:
      - redis
      - whisper
    restart: unless-stopped
    networks:
      - chat-network

volumes:
  redis_data:

networks:
  chat-network:
    driver: bridge
