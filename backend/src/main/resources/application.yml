server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  application:
    name: chat-app
  profiles:
    active: dev

  # Security
  security:
    user:
      name: admin
      password: admin123

  # Redis
  redis:
    host: localhost
    port: 6379
    timeout: 60000
    password:
    database: 0
    jedis:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: true
    deserialization:
      fail-on-unknown-properties: false

# JWT Configuration
jwt:
  secret: your-super-secret-key-change-in-production-must-be-256-bits-or-more
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days

# AWS Configuration
aws:
  region: ap-southeast-1
  accessKey: ${AWS_ACCESS_KEY_ID:dummy}
  secretKey: ${AWS_SECRET_ACCESS_KEY:dummy}

# DynamoDB Configuration
aws.dynamodb:
  endpoint: ${DYNAMODB_ENDPOINT:}
  tables:
    users: chat_users
    conversations: chat_conversations
    messages: chat_messages
    otp: chat_otp
    sessions: chat_sessions
    stories: chat_stories
    contacts: chat_contacts
    devices: chat_devices

# S3 Configuration
aws.s3:
  bucket: amzn-s3-ott-n4
  region: ap-southeast-1
  max-file-size: 104857600  # 100MB

# CORS Configuration
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://localhost:8081
    - http://localhost:19000
    - http://localhost:19006
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - Content-Type
    - Authorization
    - X-Session-Id
    - X-User-Id
    - X-Device-Id
  credentials: true
  max-age: 3600

# Firebase Configuration
firebase:
  config-path: ${FIREBASE_CONFIG_PATH:}
  database-url: ${FIREBASE_DATABASE_URL:}

# Google Gemini Configuration
google:
  gemini:
    api-key: ${GEMINI_API_KEY:AIzaSyDIBlwRg1g9KvWlhxxJ1fj-siWX9N4an9g}
    model: gemini-1.5-flash

# Logging
logging:
  level:
    root: INFO
    com.chatapp: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/chat-app.log

# Actuator & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    export:
      prometheus:
        enabled: false
      defaults:
        enabled: false

# Application Custom Settings
app:
  security:
    max-login-attempts: 5
    lockout-duration-minutes: 5
  pagination:
    default-page-size: 20
    max-page-size: 100
  file-upload:
    max-size: 104857600  # 100MB
    allowed-types:
      - jpg
      - jpeg
      - png
      - gif
      - mp4
      - pdf
      - doc
      - docx

# Swagger/OpenAPI
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Twilio SMS Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:dummy_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:dummy_token}
  from-number: ${TWILIO_FROM_NUMBER:dummy_number}
